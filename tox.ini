[tox]
env_list = py310, py311, py312, py313
isolated_build = true

[testenv]
description = Run tests with pytest
deps =
    pytest>=7.0
commands =
    pytest --doctest-modules {posargs:splatlog tests}
# Export an ENV var when testing so that code can conditionality execute on it,
# like
# 
#       if os.environ.get("TESTING"):
#           ...
# 
setenv =
    TESTING = 1

[testenv:lint]
description = Run linting and format check
deps =
    ruff>=0.15.0
commands =
    ruff check splatlog tests
    ruff format --check splatlog tests

